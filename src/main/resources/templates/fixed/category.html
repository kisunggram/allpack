<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>고정관리 - 분류등록</title>
    <link rel="stylesheet" type="text/css" href="/common.css">
    <link rel="stylesheet" type="text/css" href="/barcode.css">
    <script>
        function confirmUpload() {
            return confirm('엑셀 업로드시 모든 데이터가 초기화됩니다.');
        }

        function updateLocation(mainBarcode) {
            var input = document.getElementById('loc_' + mainBarcode);
            var store = document.getElementById('store').value;
            var newLoc = input.value.trim();

            fetch('/fixed/category/relocate', {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: 'store=' + encodeURIComponent(store) +
                      '&mainBarcode=' + encodeURIComponent(mainBarcode) +
                      '&location=' + encodeURIComponent(newLoc)
            })
            .then(r => r.json())
            .then(data => {
                if (data.result) {
                    input.setAttribute('loc', newLoc);
                    input.style.backgroundColor = '#ffffff';
                } else {
                    alert(data.message);
                }
            });
        }

        function verifyDiff(id) {
            var input = document.getElementById(id);
            var loc = input.getAttribute('loc');
            input.style.backgroundColor = input.value != loc ? '#ff4800' : '#ffffff';
        }
    </script>
</head>
<body>
<div class="layout">
<div th:replace="~{fragments/sidebar :: sidebar('fixed-category')}"></div>
<div class="main-content">
<div th:replace="~{fragments/sidebar :: breadcrumb(${ {'반품관리','고정관리','분류등록'} })}"></div>
<div class="content-body">

    <!-- 비밀번호 입력 영역 -->
    <div th:if="${passwordRequired}" id="access-password-section" class="access-password-section">
        <div class="access-password-card">
            <h2>비밀번호 확인</h2>
            <p>분류등록을 사용하려면 비밀번호를 입력해주세요.</p>
            <div class="access-password-form">
                <input type="password" id="access-password-input" class="access-password-input"
                       placeholder="비밀번호" autocomplete="current-password"/>
                <button type="button" class="access-password-button" onclick="submitAccessPassword()">확인</button>
            </div>
            <p id="access-password-error" class="access-password-error" hidden></p>
        </div>
    </div>

    <div id="categoryContent" th:style="${passwordRequired} ? 'display:none;' : ''">

    <table border="0" cellpadding="0" cellspacing="0" class="title_table">
    <tr>
        <th th:each="id : ${StoreId}" th:class="${store==id ? store : ''}">
            <a th:href="@{/fixed/category(store=${id})}" th:text="${StoreName.get(id)}"></a>
        </th>
    </tr>
    <tr><td colspan="3" th:class="${store}">
        <form method="POST" enctype="multipart/form-data" action="/fixed/category/upload" onsubmit="return confirmUpload();">
            <input type="hidden" id="store" name="store" th:value="${store}"/>
            <div>
                <label class="file-label" for="file_cat">파일 선택</label>
                <input type="file" name="excel" id="file_cat" class="file-input" onchange="document.getElementById('fn_cat').textContent=this.files[0]?this.files[0].name:'선택된 파일 없음'"/>
                <span class="file-name" id="fn_cat">선택된 파일 없음</span>
                <input type="submit" value="업로드"/>
            </div>
        </form>
    </td></tr>
    </table>

    <!-- 업로드 결과 -->
    <div th:if="${uploadResult != null}" style="margin-top:10px; padding:10px; border:1px solid #dee2e6; border-radius:4px; background:#f8f9fa; max-width:600px;">
        <p style="margin:0 0 5px;">
            업로드 완료 : 전체 <b th:text="${uploadResult.totalRows}"></b>건 중 <b th:text="${uploadResult.insertedCount}"></b>건 등록
            <span th:if="${uploadResult.hasDuplicates()}" style="color:#e03131;">
                , 중복 <b th:text="${uploadResult.duplicateTotalCount}"></b>건 제외
            </span>
        </p>
        <div th:if="${uploadResult.hasDuplicates()}" style="margin-top:5px; padding:8px; background:#fff5f5; border:1px solid #ffc9c9; border-radius:3px; font-size:12px; color:#c92a2a;">
            <b>중복 바코드 :</b>
            <span th:each="entry, iter : ${uploadResult.duplicates}">
                <span th:text="${entry.key}"></span>(<span th:text="${entry.value}"></span>건)<span th:if="${!iter.last}">, </span>
            </span>
        </div>
    </div>

    <div style="margin-top:10px;">
        <table id="categoryTable" border="0" cellpadding="0" cellspacing="0" class="rst_table" th:classappend="${store}">
            <caption>
                <form name="catDownload" method="POST" action="/fixed/category/download" style="display:inline;">
                    <input type="hidden" name="store" th:value="${store}"/>
                    <a href="javascript:document.forms['catDownload'].submit();">
                        <img src="/XlsIcon.jpg" border="0" align="top" style="height:30px;"></a>
                </form>
                &nbsp;&nbsp;&nbsp;
                <input type="button" value="추가" onclick="addRow()" style="height:30px;"/>
                &nbsp;
                <input type="button" value="수정" onclick="submitLocations()" style="height:30px;"/>
            </caption>
            <thead>
            <tr>
                <th>장소</th>
                <th></th>
                <th>바코드</th>
                <th>품목명</th>
            </tr>
            </thead>
            <tbody th:each="vo : ${list}">
            <tr>
                <td th:text="${vo.location}"></td>
                <td><input type="text" th:value="${vo.location}" size="4"
                           th:id="'loc_' + ${vo.mainBarcode}" th:loc="${vo.location}"
                           th:onchange="verifyDiff(this.getAttribute('id'))"/></td>
                <td th:text="${vo.mainBarcode}"></td>
                <td th:text="${vo.product}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <script>
        function addRow() {
            var table = document.getElementById('categoryTable');
            var tbody = document.createElement('tbody');
            tbody.className = 'new-row';
            tbody.innerHTML =
                '<tr style="background:#fff9db;">' +
                    '<td></td>' +
                    '<td><input type="text" class="new-loc" size="4"/></td>' +
                    '<td><input type="text" class="new-barcode" size="12"/></td>' +
                    '<td><input type="text" class="new-product" size="40" style="width:100%;"/></td>' +
                '</tr>';
            table.appendChild(tbody);
            tbody.querySelector('.new-barcode').focus();
        }

        function collectNewRows() {
            var rows = [];
            document.querySelectorAll('tbody.new-row').forEach(function(tb) {
                var barcode = tb.querySelector('.new-barcode').value.trim();
                if (barcode === '') return;
                rows.push({
                    tbody: tb,
                    mainBarcode: barcode,
                    product: tb.querySelector('.new-product').value.trim(),
                    location: tb.querySelector('.new-loc').value.trim()
                });
            });
            return rows;
        }

        function checkDuplicateLocations(newRows) {
            var locMap = {};  // location -> count
            document.querySelectorAll('[id^="loc_"]').forEach(function(input) {
                var loc = input.value.trim();
                if (loc === '' || loc === '시즌아웃') return;
                locMap[loc] = (locMap[loc] || 0) + 1;
            });
            newRows.forEach(function(r) {
                if (r.location === '' || r.location === '시즌아웃') return;
                locMap[r.location] = (locMap[r.location] || 0) + 1;
            });

            var dupLocs = [];
            for (var loc in locMap) {
                if (locMap[loc] > 1) dupLocs.push(loc);
            }
            return dupLocs;
        }

        function submitLocations() {
            var newRows = collectNewRows();

            // 클라이언트 중복 체크
            var dupLocs = checkDuplicateLocations(newRows);
            if (dupLocs.length > 0) {
                alert('중복되는 장소가 존재합니다. [' + dupLocs.join(', ') + ']');
                return;
            }

            var store = document.getElementById('store').value;
            var promises = [];

            // 기존 행 장소 수정
            document.querySelectorAll('[id^="loc_"]').forEach(function(input) {
                var loc = input.getAttribute('loc');
                if (input.value.trim() !== loc) {
                    var mainBarcode = input.id.replace('loc_', '');
                    promises.push(
                        fetch('/fixed/category/relocate', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                            body: 'store=' + encodeURIComponent(store) +
                                  '&mainBarcode=' + encodeURIComponent(mainBarcode) +
                                  '&location=' + encodeURIComponent(input.value.trim())
                        }).then(r => r.json())
                    );
                }
            });

            // 신규 행 등록
            newRows.forEach(function(r) {
                promises.push(
                    fetch('/fixed/category/insert', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                        body: 'store=' + encodeURIComponent(store) +
                              '&mainBarcode=' + encodeURIComponent(r.mainBarcode) +
                              '&product=' + encodeURIComponent(r.product) +
                              '&location=' + encodeURIComponent(r.location)
                    }).then(res => res.json())
                );
            });

            if (promises.length === 0) {
                alert('변경된 내용이 없습니다.');
                return;
            }
            Promise.all(promises).then(results => {
                var errors = [];
                results.forEach(function(data) {
                    if (!data.result) errors.push(data.message);
                });
                if (errors.length > 0) {
                    alert(errors.join('\n'));
                } else {
                    location.reload();
                }
            });
        }
    </script>

    </div><!-- categoryContent -->

    <script th:if="${passwordRequired}">
        (function () {
            var input = document.getElementById('access-password-input');
            var error = document.getElementById('access-password-error');

            window.submitAccessPassword = function () {
                fetch('/session/password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                    body: 'password=' + encodeURIComponent(input.value)
                })
                .then(r => r.json())
                .then(data => {
                    if (data.result) {
                        document.getElementById('access-password-section').style.display = 'none';
                        document.getElementById('categoryContent').style.display = '';
                    } else {
                        error.textContent = data.message || '비밀번호를 다시 확인해주세요.';
                        error.hidden = false;
                        input.focus();
                        input.select();
                    }
                })
                .catch(function () {
                    error.textContent = '비밀번호 확인 중 오류가 발생했습니다.';
                    error.hidden = false;
                });
            };

            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    submitAccessPassword();
                }
            });
            input.focus();
        })();
    </script>

</div><!-- content-body -->
</div><!-- main-content -->
</div><!-- layout -->
</body>
</html>
