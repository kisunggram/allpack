<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>고정관리 - 분류고정내역</title>
    <link rel="stylesheet" type="text/css" href="/common.css">
    <link rel="stylesheet" type="text/css" href="/barcode.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <style>
        .date-picker-area { margin: 10px 0; display: flex; align-items: center; gap: 8px; }
        .date-picker-area input[type="text"] {
            border: 1px solid #ced4da; border-radius: 3px;
            padding: 4px 8px; font-size: 13px; color: #343a40;
            width: 140px; background: #fff;
        }
    </style>
</head>
<body>
<div class="layout">
<div th:replace="~{fragments/sidebar :: sidebar('fixed-history-cate')}"></div>
<div class="main-content">
<div th:replace="~{fragments/sidebar :: breadcrumb(${ {'반품관리','고정관리','분류고정내역'} })}"></div>
<div class="content-body">

    <table border="0" cellpadding="0" cellspacing="0" class="title_table">
    <tr>
        <th th:each="id : ${StoreId}" th:class="${store==id ? store : ''}">
            <a th:href="@{/fixed/history-cate(store=${id})}" th:text="${StoreName.get(id)}"></a>
        </th>
    </tr>
    </table>

    <!-- 날짜 선택 -->
    <div class="date-picker-area">
        <label>조회 일자 :</label>
        <input type="text" id="datePicker" th:value="${selectedDate}" placeholder="날짜 선택" readonly/>
    </div>

    <script th:inline="javascript">
        var todayDate = /*[[${todayDate}]]*/ '';
        var selectedDate = /*[[${selectedDate}]]*/ '';
        var storeVal = /*[[${store}]]*/ '';

        var maxDateObj = new Date(todayDate + 'T00:00:00');
        var maxYear = maxDateObj.getFullYear();
        var maxMonth = maxDateObj.getMonth();
        var navGuard = false;

        function loadMonthDates(year, month, fp) {
            fetch('/fixed/history-cate/dates?store=' + encodeURIComponent(storeVal) +
                  '&year=' + year + '&month=' + month)
                .then(r => r.json())
                .then(dates => {
                    fp.set('enable', dates.length > 0 ? dates : [function() { return false; }]);
                });
        }

        function clampToMaxMonth(instance) {
            if (navGuard) return false;
            if (instance.currentYear > maxYear ||
                (instance.currentYear === maxYear && instance.currentMonth > maxMonth)) {
                navGuard = true;
                instance.currentYear = maxYear;
                instance.currentMonth = maxMonth;
                instance.redraw();
                navGuard = false;
                return true;
            }
            return false;
        }

        var fp = flatpickr('#datePicker', {
            locale: 'ko',
            maxDate: todayDate,
            defaultDate: selectedDate || null,
            dateFormat: 'Y-m-d',
            enable: [function() { return false; }],
            onReady: function(dates, dateStr, instance) {
                loadMonthDates(instance.currentYear, instance.currentMonth + 1, instance);
            },
            onMonthChange: function(dates, dateStr, instance) {
                if (clampToMaxMonth(instance)) return;
                loadMonthDates(instance.currentYear, instance.currentMonth + 1, instance);
            },
            onYearChange: function(dates, dateStr, instance) {
                if (clampToMaxMonth(instance)) return;
                loadMonthDates(instance.currentYear, instance.currentMonth + 1, instance);
            },
            onChange: function(dates, dateStr) {
                if (dateStr) {
                    location.href = '/fixed/history-cate?store=' + encodeURIComponent(storeVal) + '&date=' + dateStr;
                }
            }
        });
    </script>

    <!-- 선택된 날짜의 상세 -->
    <div th:if="${selectedDate != null}">
        <p>반품등록 일자(엑셀 업로드 기준) : <span th:text="${uploadDate != null ? uploadDate : '-'}"></span></p>

        <table th:if="${!#lists.isEmpty(historyList)}" border="0" cellpadding="0" cellspacing="0" class="rst_table" th:classappend="${store}">
            <caption>
                <form name="histCateDownload" method="POST" action="/fixed/history-cate/download" style="display:inline;">
                    <input type="hidden" name="store" th:value="${store}"/>
                    <input type="hidden" name="uploadDate" th:value="${uploadDate}"/>
                    <input type="hidden" name="date" th:value="${selectedDate}"/>
                    <a href="javascript:document.forms['histCateDownload'].submit();">
                        <img src="/XlsIcon.jpg" border="0" align="top" style="height:30px;"></a>
                </form>
            </caption>
            <thead>
            <tr>
                <th>장소</th>
                <th>바코드</th>
                <th>품목명</th>
            </tr>
            </thead>
            <tbody th:each="vo : ${historyList}">
            <tr>
                <td th:text="${vo.location}"></td>
                <td th:text="${vo.mainBarcode}"></td>
                <td th:text="${vo.product}"></td>
            </tr>
            </tbody>
        </table>
        <p th:if="${#lists.isEmpty(historyList)}">해당 일자에 내역이 없습니다.</p>
    </div>

</div><!-- content-body -->
</div><!-- main-content -->
</div><!-- layout -->
</body>
</html>
