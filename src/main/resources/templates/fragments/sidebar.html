<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="sidebar(currentMenu)" class="sidebar" id="sidebar">
    <div class="sidebar-content">

        <div class="menu-group">
            <div class="menu-title">
                반품관리 <span class="arrow open">&#9654;</span>
            </div>
            <ul class="open">
                <li>
                    <a th:href="@{/barcode}" th:classappend="${currentMenu == 'general' ? 'active' : ''}">일반관리</a>
                </li>
                <li>
                    <div class="submenu-title">
                        고정관리 <span class="arrow open">&#9654;</span>
                    </div>
                    <ul class="open">
                        <li><a th:href="@{/fixed/category}" th:classappend="${currentMenu == 'fixed-category' ? 'active' : ''}">분류고정</a></li>
                        <li><a th:href="@{/fixed/return}" th:classappend="${currentMenu == 'fixed-return' ? 'active' : ''}">반품등록</a></li>
                        <li><a th:href="@{/fixed/history}" th:classappend="${currentMenu == 'fixed-history' ? 'active' : ''}">일자별 이력</a></li>
                        <li><a th:href="@{/fixed/history-cate}" th:classappend="${currentMenu == 'fixed-history-cate' ? 'active' : ''}">분류고정 내역</a></li>
                    </ul>
                </li>
            </ul>
        </div>

        <div class="menu-group">
            <div class="menu-title">
                재고관리 <span class="arrow open">&#9654;</span>
            </div>
            <ul class="open">
                <li><a th:href="@{/inventory}" th:classappend="${currentMenu == 'inventory' ? 'active' : ''}">재고관리</a></li>
            </ul>
        </div>

        <div class="menu-group">
            <div class="menu-title">
                유틸 <span class="arrow open">&#9654;</span>
            </div>
            <ul class="open">
                <li>
                    <a th:href="@{/util/excel}" th:classappend="${currentMenu == 'general' ? 'active' : ''}">엑셀정리</a>
                </li>
            </ul>
        </div>

    </div>
</div>

<div th:fragment="breadcrumb(paths)" class="breadcrumb">
    <th:block th:each="p, iter : ${paths}">
        <span th:text="${p}"></span>
        <span th:if="${!iter.last}" class="sep">&gt;</span>
    </th:block>
</div>
</body>
</html>
